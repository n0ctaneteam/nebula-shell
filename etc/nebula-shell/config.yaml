# /etc/nebula-shell/config.yaml
# System default configuration for NebulaShell
nebula/bar:
  id: main_bar
  style_class: "bar"
  anchor: [top]
  children:
    - nebula/workspaces:
        id: workspaces
        style_class: "workspaces"

    - nebula/box:
        id: right_section
        orientation: horizontal
        spacing: 5
        style_class: "right-section"
        children:
          - nebula/clock:
              id: system_clock
              style_class: "clock"
              format: "%H:%M:%S"
              on_click: "toggle_clock_format"

          - nebula/cpu:
              id: cpu_meter
              style_class: "cpu-bar"
              update_interval: 1

          - nebula/button:
              id: toggle_panel_btn
              label: \u{2715}
              style_class: "panel-toggle-btn"
              on_click: "toggle_panel_visibility"

nebula/panel:
  id: main_panel
  style_class: "panel"
  visible: false
  anchor: [bottom]
  exclusive: true
  height: 300
  children:
    - nebula/box:
        id: panel_content
        orientation: vertical
        spacing: 10
        children:
          - nebula/label:
              id: panel_title
              text: "NebulaShell Control Panel"
              style_class: "panel-title"

          - nebula/button:
              id: close_panel_btn
              label: "Close Panel"
              style_class: "panel-close-btn"
              on_click: "toggle_panel_visibility"

          - nebula/separator:
              id: panel_sep
              style_class: "panel-separator"

          - nebula/box:
              id: panel_actions
              orientation: horizontal
              spacing: 5
              style_class: "panel-actions"
              children:
                - nebula/button:
                    id: about_btn
                    label: "About NebulaShell"
                    style_class: "panel-about-btn"
                    on_click: "show_about_dialog"

                - nebula/button:
                    id: reload_btn
                    label: "Reload Config"
                    style_class: "panel-reload-btn"
                    on_click: "reload_config"

nebula/popup:
  id: demo_popup
  style_class: "popup"
  anchor: center
  size: {w: 400, h: 300}
  visible: true
  children:
    - nebula/box:
        id: popup_content
        orientation: vertical
        spacing: 8
        children:
          - nebula/box:
              id: popup_header
              orientation: horizontal
              spacing: 0
              children:
                - nebula/label:
                    id: popup_title
                    text: "Popup Demo"
                    style_class: "popup-title"

                - nebula/box:
                    id: popup_header_spacer
                    orientation: horizontal

                - nebula/button:
                    id: popup_close_btn
                    label: "\u{2715}"
                    style_class: "popup-close-btn"

          - nebula/separator:
              id: popup_sep
              style_class: "popup-separator"

          - nebula/label:
              id: popup_body
              text: "This is a demo popup widget.\n\nPopups appear on the OVERLAY layer with\na backdrop beneath them on the TOP layer."
              style_class: "popup-content"
